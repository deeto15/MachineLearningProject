services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  scraper:
    build: ./scraper
    container_name: scraper
    env_file: 'scraper/testing.env'
    depends_on:
      - redis
      - rabbitmq
   
  postgres:
    image: postgres:17
    container_name: postgres_dev
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: testdb

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
 
  comment-processor:
    build: ./comment-processor
    env_file: 'comment-processor/.env'
    depends_on:
      - rabbitmq
      - postgres
    

volumes:
  redis_data:
  rabbitmq_data:
  pgdata: