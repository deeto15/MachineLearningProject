name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pandas nltk python-dateutil
      - run: pytest tests -q

  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: scraper/go.mod
      - run: go build ./...
        working-directory: scraper
      - run: go vet ./...
        working-directory: scraper
